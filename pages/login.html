<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Customatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-heading">
            <h1>Login to Customatch</h1>
            <p>Access your designs and order history.</p>
        </div>

        <div class="card auth-card">
            <div id="authStatus" class="auth-status"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" id="email" type="email" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" type="password" required />
                </div>
                <button class="btn btn-primary auth-button" type="submit">Login</button>
            </form>

            <p class="auth-footer">No account yet? <a href="signup.html">Create one</a>.</p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAuthActions('authStatus');
            const current = getCurrentUser();
            if (current) {
                navigateTo('index.html');
                return;
            }

            const form = document.getElementById('loginForm');
            const errorEl = document.createElement('div');
            errorEl.id = 'loginError';
            errorEl.className = 'auth-error';
            form.parentNode.insertBefore(errorEl, form);

            const successEl = document.createElement('div');
            successEl.id = 'loginSuccess';
            successEl.className = 'auth-success';
            form.parentNode.insertBefore(successEl, form);

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                errorEl.textContent = '';
                successEl.textContent = '';
                successEl.style.display = 'none';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                if (!email) {
                    errorEl.textContent = 'Please enter your email address.';
                    return;
                }
                if (!password) {
                    errorEl.textContent = 'Please enter your password.';
                    return;
                }

                const result = loginUser({ email, password });

                if (!result.success) {
                    errorEl.textContent = result.message;
                    if (result.locked) {
                        document.getElementById('loginForm').style.opacity = '0.6';
                        document.getElementById('loginForm').style.pointerEvents = 'none';
                    }
                    return;
                }

                successEl.textContent = result.message || 'Login successful! Redirecting...';
                successEl.classList.add('show');
                document.getElementById('loginForm').style.opacity = '0.5';
                document.getElementById('loginForm').style.pointerEvents = 'none';

                setTimeout(() => {
                    applyPostAuthRedirect('index.html');
                }, 1500);
            });
        });
    </script>
</body>
</html>
